<header class="app-header"><div><p class="eyebrow">93-95 Gloucester Rd, Croydon CR0 2DN</p><h1>Job Cards</h1><p>Create and review job cards.</p></div><nav class="header-actions"><a href="../portal/">Staff Portal</a><a href="../timesheets/">Timesheets</a><a href="../tools/">Tools</a></nav></header>
<main class="app-main" hidden><div class="portal-two-column"><form class="card portal-form" id="job-card-form"><h3>Create job card</h3><label>Job reference<input id="job-ref" placeholder="e.g. GMT-2026-001" required></label><label>Customer / client<input id="job-client" placeholder="Customer name" required></label><label>Site address<input id="job-site" placeholder="Site or job address"></label><label>Assigned engineer<input id="job-engineer" placeholder="Engineer name"></label><label>Planned date<input id="job-date" type="date"></label><label>Optional image / photo<input id="job-image" name="job_image" type="file" accept="image/*"><span class="small-text">Optional site, issue, or completion image. This is included in the FormSubmit email where supported.</span></label><label>Work description<textarea id="job-description" rows="4" placeholder="Work requested, access notes, parts, risks"></textarea></label><button type="submit">Create job card</button></form><section class="card"><h3>Submitted job cards</h3><p class="small-text">Accounts reviews and manages authoritative job-card status in Microsoft 365.</p><div id="job-card-list" class="portal-list"></div></section></div></main>
<script src="../portal.js"></script><script src="../add-logo.js?v=remove-intros-20260626"></script>
