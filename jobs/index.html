<!doctype html>
<html lang="en">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>GMT Job Cards</title><link rel="stylesheet" href="../styles.css?v=logo-20260625"><link rel="stylesheet" href="../portal.css?v=logo-20260625"></head>
<body>
<header class="app-header"><div><p class="eyebrow">GMT Electrical Services</p><h1>Job Cards</h1><p>Create and review job cards.</p></div><nav class="header-actions"><a href="../index.html">Dashboard</a><a href="../timesheets/">Timesheets</a><a href="../tasks/">Tasks</a><a href="../calendar/">Calendar</a></nav></header>
<main class="app-main"><section class="card intro-card"><h2>Job Cards</h2><p>Create job cards for site work, then review and approve them from the admin queue.</p></section><div class="portal-two-column"><form class="card portal-form" id="job-card-form"><h3>Create job card</h3><label>Job reference<input id="job-ref" placeholder="e.g. GMT-2026-001"></label><label>Customer / client<input id="job-client" placeholder="Customer name"></label><label>Site address<input id="job-site" placeholder="Site or job address"></label><label>Assigned engineer<input id="job-engineer" placeholder="Engineer name"></label><label>Planned date<input id="job-date" type="date"></label><label>Work description<textarea id="job-description" rows="4" placeholder="Work requested, access notes, parts, risks"></textarea></label><button type="submit">Create job card</button></form><section class="card"><h3>Admin review queue</h3><p class="small-text">Job cards are saved locally and emailed via FormSubmit for review.</p><div id="job-card-list" class="portal-list"></div></section></div></main>
<script src="../config.js"></script><script src="../portal.js"></script><script src="../portal-extensions.js"></script><script src="../add-logo.js?v=logo-20260625"></script>
</body></html>
