<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>GMT Timesheets</title>
<link rel="stylesheet" href="../styles.css?v=timesheet-nav-clean-20260626">
<link rel="stylesheet" href="../portal.css?v=timesheet-nav-clean-20260626">
</head>
<body>
<header class="app-header">
<div class="brand-block"><img src="../image.png" alt="GMT Electrical Services Ltd logo" class="site-logo"><div><p class="eyebrow">93-95 Gloucester Rd, Croydon CR0 2DN</p><h1>Timesheets</h1><p>Create or analyse timesheets.</p></div></div>
<nav class="header-actions"><a href="../portal/">Staff Portal</a><a href="../jobs/">Job Cards</a><a href="../tools/">Tools</a></nav>
</header>
<main class="app-main">
<section class="portal-card-grid">
<a class="portal-feature-card" href="create.html"><span>Create Timesheet</span><small>Open the weekly timesheet form.</small></a>
<a class="portal-feature-card" href="../audit/index.html"><span>Analyse Sheet/s</span><small>Open the audit checker.</small></a>
<form class="portal-feature-card clock-card" data-clock-form data-default-action="clock_in">
<span data-clock-title>Clock In</span><small data-clock-description>Record an arrival time and send it to accounts.</small>
<label>Full name<input name="employee_name" autocomplete="name" required placeholder="Your name"></label>
<label>Action<select name="clock_action"><option value="clock_in">Clock in</option><option value="clock_out">Clock out</option></select></label>
<label>Time<input name="clock_time" type="time" required></label>
<button type="submit" data-clock-submit>Submit clock in</button>
<p class="small-text clock-status" aria-live="polite"></p>
</form>
</section>
</main>
<script src="../config.js"></script>
<script src="../timesheet-clock.js"></script>
</body>
</html>
